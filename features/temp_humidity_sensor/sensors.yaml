# Local sensor config for shelly_ht_logger.py — sensor and location are
# synonymous here; the label is what lands in the csv's Location column.
# IPs noted for reference (device web UI: http://<ip>).

broker: broker.hivemq.com
port: 1883
username: null
password: null

# single combined csv all sensors append to
output_csv: /project/dune/slow_control/temp_humidity/temp_humidity.csv

# Labels = physical locations in the High Bay (they land in the csv's Location
# column). "Particle Counter" is reserved for the Particle Plus counter's own
# temp/RH (added dashboard-side from the measurement archive, not logged here).
sensors:
  ht-1:                                  # IP 10.67.67.202  (was "Sensor 1")
    prefix: shellyhtg3-80b54e35ba60
    label: "CF Prep"
  ht-2:                                  # IP 10.67.67.96   (was "Sensor 2")
    prefix: shellyhtg3-d885ac14bad4
    label: "CRP Packing"
  ht-3:                                  # IP 10.67.65.129  (was "Sensor 3")
    prefix: shellyhtg3-d885ac1345e0
    label: "Storage"
  ht-4:                                  # IP 10.67.65.68   (was "Sensor 4")
    prefix: shellyhtg3-80b54e3943dc
    label: "Coldbox"
  ht-5:                                  # IP 10.67.77.54   (was "Sensor 5")
    prefix: shellyhtg3-d885ac1495c4
    label: "Entrance"

# csv rows written BEFORE the rename (and by a logger that hasn't been
# restarted yet) carry the old Location values — the dashboard reader merges
# them into the current labels so each location stays ONE series.
aliases:
  "Sensor 1": "CF Prep"
  "Sensor 2": "CRP Packing"
  "Sensor 3": "Storage"
  "Sensor 4": "Coldbox"
  "Sensor 5": "Entrance"
